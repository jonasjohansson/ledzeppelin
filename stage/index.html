<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LEDZeppelin — Stage</title>
<link rel="icon" href="../favicon.svg">
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  /* The composite, letterboxed to its aspect; object-fit works on a canvas as a
     replaced element, so the drawing buffer (sized to the frame) stays crisp. */
  #out { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain;
    image-rendering: pixelated; }
  #hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #555; font: 13px ui-monospace, monospace; pointer-events: none; }
</style>
</head>
<body>
  <canvas id="out"></canvas>
  <div id="hint">waiting for the editor…</div>
  <script type="module" src="./stage.js"></script>
</body>
</html>
