<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0a0a0b">
  <title>LED Zeppelin — Guide</title>
  <link rel="icon" href="../icons/favicon.png">
  <link rel="stylesheet" href="../src/ui/ui.css">
  <style>
    :root { --gw: 16rem; }
    html, body { height: 100%; }
    body { margin: 0; background: var(--bg, #0a0a0b); color: var(--fg, #e6e6e6); }
    .guide { display: grid; grid-template-columns: var(--gw) 1fr; height: 100%; }
    /* Sidebar */
    .g-nav { border-right: 1px solid var(--line, #1e1e22); overflow-y: auto; padding: 1rem 0; background: var(--bg-2, #0c0c0e); }
    .g-nav h1 { font-size: var(--fs-body, .82rem); letter-spacing: .04em; text-transform: uppercase; color: var(--muted, #9a9aa2); margin: 0 1rem .75rem; }
    .g-nav a { display: block; padding: .35rem 1rem; color: var(--muted, #9a9aa2); text-decoration: none; font-size: var(--fs-body, .82rem); border-left: 2px solid transparent; }
    .g-nav a:hover { color: var(--fg, #e6e6e6); background: var(--hover, #161619); }
    .g-nav a.is-on { color: var(--fg, #e6e6e6); border-left-color: var(--accent, #6c7cff); background: var(--hover, #161619); }
    /* Content */
    .g-main { overflow-y: auto; padding: 2.5rem clamp(1.25rem, 5vw, 4rem); }
    .doc { max-width: 50rem; margin: 0 auto; line-height: 1.6; }
    .doc h1, .doc h2, .doc h3, .doc h4 { line-height: 1.25; margin: 2rem 0 .75rem; scroll-margin-top: 1rem; }
    .doc h1 { font-size: 1.7rem; margin-top: 0; }
    .doc h2 { font-size: 1.3rem; border-bottom: 1px solid var(--line, #1e1e22); padding-bottom: .3rem; }
    .doc h3 { font-size: 1.05rem; }
    .doc p, .doc li { color: var(--fg, #e6e6e6); }
    .doc a { color: var(--accent, #8b9aff); text-decoration: none; }
    .doc a:hover { text-decoration: underline; }
    .doc code { background: var(--hover, #161619); border: 1px solid var(--line, #1e1e22); border-radius: 3px; padding: .05em .35em; font-size: .9em; }
    .doc pre { background: var(--bg-2, #0c0c0e); border: 1px solid var(--line, #1e1e22); border-radius: 6px; padding: .9rem 1rem; overflow-x: auto; }
    .doc pre code { background: none; border: none; padding: 0; }
    .doc blockquote { margin: 1rem 0; padding: .5rem 1rem; border-left: 3px solid var(--accent, #6c7cff); background: var(--hover, #161619); color: var(--muted, #c2c2ca); }
    .doc table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: var(--fs-body, .85rem); }
    .doc th, .doc td { border: 1px solid var(--line, #1e1e22); padding: .45rem .65rem; text-align: left; vertical-align: top; }
    .doc th { background: var(--bg-2, #0c0c0e); }
    .doc hr { border: none; border-top: 1px solid var(--line, #1e1e22); margin: 2rem 0; }
    .g-err { color: #ff6b6b; }
    @media (max-width: 720px) { .guide { grid-template-columns: 1fr; } .g-nav { display: none; } }
  </style>
</head>
<body>
  <div class="guide">
    <nav class="g-nav" id="g-nav"><h1>LED Zeppelin Guide</h1></nav>
    <main class="g-main"><article class="doc" id="g-doc">Loading…</article></main>
  </div>
  <script type="module" src="./guide.js"></script>
</body>
</html>
