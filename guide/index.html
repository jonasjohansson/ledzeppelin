<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#ffffff">
  <title>LED Zeppelin — Guide</title>
  <link rel="icon" href="../icons/favicon.png">
  <style>
    /* Plain, GitHub-readme-style docs. System font, light, readable column. */
    :root {
      --gw: 16rem; --fg: #1f2328; --muted: #59636e; --bg: #ffffff; --bg-2: #f6f8fa;
      --line: #d1d9e0; --accent: #0969da; --code-bg: #eff1f3;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    html, body { height: 100%; }
    body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font); }
    .guide { display: grid; grid-template-columns: var(--gw) 1fr; height: 100%; }
    .g-nav { border-right: 1px solid var(--line); overflow-y: auto; padding: 1.25rem 0; background: var(--bg-2); }
    .g-nav h1 { font-size: .8rem; letter-spacing: .03em; text-transform: uppercase; color: var(--muted); margin: 0 1rem .75rem; }
    .g-nav a { display: block; padding: .3rem 1rem; color: var(--muted); text-decoration: none; font-size: .9rem; border-left: 2px solid transparent; }
    .g-nav a:hover { color: var(--fg); background: #eaeef2; }
    .g-nav a.is-on { color: var(--fg); font-weight: 600; border-left-color: var(--accent); background: #eaeef2; }
    .g-main { overflow-y: auto; padding: 2.5rem clamp(1.25rem, 5vw, 4rem); }
    .doc { max-width: 46rem; margin: 0 auto; line-height: 1.6; font-size: 1rem; }
    .doc h1, .doc h2, .doc h3, .doc h4 { line-height: 1.25; margin: 1.75rem 0 .75rem; scroll-margin-top: 1rem; font-weight: 600; }
    .doc h1 { font-size: 1.9rem; margin-top: 0; }
    .doc h2 { font-size: 1.4rem; border-bottom: 1px solid var(--line); padding-bottom: .3rem; }
    .doc h3 { font-size: 1.1rem; }
    .doc a { color: var(--accent); text-decoration: none; }
    .doc a:hover { text-decoration: underline; }
    .doc img { max-width: 100%; height: auto; border: 1px solid var(--line); border-radius: 6px; margin: 1rem 0; display: block; }
    .doc code { background: var(--code-bg); border-radius: 4px; padding: .12em .35em; font-size: .88em; font-family: var(--mono); }
    .doc pre { background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; padding: .9rem 1rem; overflow-x: auto; }
    .doc pre code { background: none; padding: 0; font-size: .85em; }
    .doc blockquote { margin: 1rem 0; padding: .4rem 1rem; border-left: 3px solid var(--accent); color: var(--muted); }
    .doc table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: .92rem; }
    .doc th, .doc td { border: 1px solid var(--line); padding: .45rem .65rem; text-align: left; vertical-align: top; }
    .doc th { background: var(--bg-2); }
    .doc hr { border: none; border-top: 1px solid var(--line); margin: 2rem 0; }
    .doc figcaption, .doc em.cap { display: block; color: var(--muted); font-size: .85rem; margin: -.5rem 0 1.25rem; }
    .g-err { color: #cf222e; }
    @media (max-width: 720px) { .guide { grid-template-columns: 1fr; } .g-nav { display: none; } }
  </style>
</head>
<body>
  <div class="guide">
    <nav class="g-nav" id="g-nav"><h1>LED Zeppelin Guide</h1></nav>
    <main class="g-main"><article class="doc" id="g-doc">Loading…</article></main>
  </div>
  <script type="module" src="./guide.js"></script>
</body>
</html>
