<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mappings · Led Zeppelin</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../src/ui/ui.css">
<style>
  html, body { margin: 0; background: var(--bg, #0a0a0a); color: var(--text, #eee); font: 12px var(--sans, system-ui, sans-serif); }
  .map-wrap { padding: 14px 16px 40px; max-width: 920px; margin: 0 auto; }
  /* Narrow (embedded in the sidebar tab): stack each row onto two lines. */
  @media (max-width: 560px) {
    .map-wrap { padding: 10px 10px 30px; }
    .row { grid-template-columns: 1fr auto; grid-template-areas: "label acts" "osc chan"; row-gap: 2px; }
    .row-label { grid-area: label; } .row-acts { grid-area: acts; }
    .row-osc { grid-area: osc; } .row-chan { grid-area: chan; justify-self: end; }
  }
  .map-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .map-title { font-weight: 600; letter-spacing: var(--ls-caps, .08em); text-transform: uppercase; color: var(--accent, #e8a35c); }
  .map-status { margin-left: auto; font-size: 11px; color: var(--muted, #888); }
  .map-sec { font: var(--fw-med, 500) 11px var(--sans); letter-spacing: var(--ls-caps, .08em); text-transform: uppercase; color: var(--faint, #777);
    border-bottom: 1px solid color-mix(in srgb, var(--accent, #e8a35c) 24%, transparent); padding: 0 0 4px; margin: 16px 0 8px; }
  /* live channel monitor */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: flex; align-items: center; gap: 6px; padding: 3px 8px; border: 1px solid var(--line, #333); border-radius: 4px; background: var(--field-bg, #1a1a1a); }
  .chip-name { font-family: var(--mono, monospace); color: var(--muted, #aaa); }
  .chip-bar { width: 56px; height: 6px; border-radius: 3px; background: var(--line-2, #444); overflow: hidden; }
  .chip-fill { height: 100%; background: var(--accent, #e8a35c); width: 0; }
  .chip-empty { color: var(--faint, #777); font-style: italic; }
  .sec-aside { color: var(--faint, #777); text-transform: none; letter-spacing: 0; font-weight: 400; }
  /* parameter table — columns: label · OSC · MIDI · Key (· mode) */
  .grp { margin: 11px 0 2px; color: var(--muted, #aaa); font-weight: 600; font-size: 11px; }
  .row { display: grid; grid-template-columns: 1.1fr 1.5fr 116px 116px 64px; align-items: center; gap: 10px; padding: 4px 6px; margin: 0 -6px; border-top: 1px solid color-mix(in srgb, var(--line, #333) 50%, transparent); border-radius: 4px; }
  .row.bound .row-label { color: var(--accent-text, #f1d6bb); }
  .row-head { border-top: none; color: var(--faint,#777); font-size: 10px; letter-spacing: var(--ls-caps,.08em); text-transform: uppercase; padding-bottom: 0; }
  .row-label { color: var(--text, #eee); }
  .row-osc { font-family: var(--mono, monospace); color: var(--muted, #999); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: copy; }
  .row-osc:hover { color: var(--accent, #e8a35c); }
  .cell-h { font-family: var(--sans); color: var(--faint,#777); }
  /* a MIDI / Key cell */
  .cell { display: flex; align-items: center; gap: 6px; min-width: 0; border: 1px solid var(--line,#333); border-radius: 4px; padding: 2px 6px; cursor: pointer; font-family: var(--mono, monospace); }
  .cell:hover { border-color: var(--line-2,#555); }
  .cell.armed { background: var(--accent-soft,#33271a); border-color: var(--accent-line,#54402b); }
  .cell.disabled { border-color: transparent; cursor: default; }
  .cell.disabled:hover { border-color: transparent; }
  .cell-arm { color: var(--accent,#e8a35c); }
  .cell-none { color: var(--faint,#777); }
  .cell-chan { color: var(--accent-text,#f1d6bb); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cell-bar { flex: 1 1 auto; min-width: 14px; height: 5px; border-radius: 3px; background: var(--line-2,#444); overflow: hidden; }
  .cell-fill { height: 100%; width: 0; background: var(--accent,#e8a35c); }
  .row-mode { background: var(--field-bg,#1a1a1a); border: 1px solid var(--line,#333); border-radius: 4px; color: var(--muted,#aaa); cursor: pointer; font: 10px var(--mono,monospace); padding: 1px 6px; justify-self: start; }
  .row-mode:hover { color: var(--text,#eee); }
  .m-x { background: none; border: none; color: var(--faint, #777); cursor: pointer; font: inherit; padding: 0; }
  .m-x:hover { color: var(--danger, #e66); }
  button.m-btn { background: var(--field-bg, #1a1a1a); color: var(--muted, #aaa); border: 1px solid var(--line, #333); border-radius: 4px; padding: 3px 9px; cursor: pointer; font: inherit; }
  button.m-btn:hover { color: var(--text, #eee); }
  button.m-btn:disabled { color: var(--accent-text, #f1d6bb); border-color: var(--accent-line, #54402b); }
  .map-toolbar { display: flex; gap: 8px; align-items: center; }
  .hint { font-size: 11px; color: var(--faint, #777); }
  .map-socket { margin: -4px 0 10px; display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }
  .map-socket code { font-family: var(--mono, monospace); color: var(--accent, #e8a35c); background: var(--field-bg, #1a1a1a); border: 1px solid var(--line, #333); padding: 1px 5px; border-radius: 4px; }
  .map-osc-in { margin: -4px 0 10px; display: flex; align-items: center; gap: 8px; }
  .map-osc-in input { width: 72px; font: 12px var(--mono, monospace); color: var(--text, #eee); background: var(--field-bg, #1a1a1a); border: 1px solid var(--line-2, #474c55); border-radius: 4px; padding: 2px 6px; }
  #osc-port-status { font-size: 11px; }
</style>
</head>
<body>
<div class="map-wrap">
  <div class="map-head">
    <span class="map-title">Mappings</span>
    <div class="map-toolbar">
      <button class="m-btn" id="enable-midi">enable MIDI</button>
      <span class="hint" id="midi-status"></span>
    </div>
  </div>

  <div class="map-sec">osc input</div>
  <div class="hint map-osc-in">listening on UDP port
    <input id="osc-port" type="number" min="1" max="65535" step="1" value="9000">
    <span id="osc-port-status"></span></div>

  <div class="map-sec">parameters</div>
  <!-- Any address can be driven directly (no mapping needed) over OSC or the socket. -->
  <div class="hint map-socket">Drive any address directly with a 0–1 value:
    <code>OSC → UDP :<span id="osc-port-echo">9000</span></code>
    <code>socket {"type":"ext","channel":"/…","value":0.5}</code></div>
  <div id="params"><span class="chip-empty">connecting…</span></div>
</div>
<script type="module" src="./mappings.js"></script>
</body>
</html>
