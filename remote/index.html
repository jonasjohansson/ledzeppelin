<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LZ Control">
<meta name="application-name" content="LZ Control">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#101114">
<!-- Installable as a home-screen app (iOS Add to Home Screen / Android install). -->
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="../icons/icon-180.png">
<title>Led Zeppelin — Control</title>
<style>
  :root{
    --bg:#101114; --panel:#1c1e22; --panel-2:#26282d; --line:#33363e; --line-2:#474c55;
    --text:#f4f5f7; --muted:#a3aab4; --accent:#e8a35c; --accent-soft:#33271a; --danger:#ff6b6b;
    --mono:"Spline Sans Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --radius:8px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
  html,body{ margin:0; background:var(--bg); color:var(--text); font-family:var(--mono); font-size:15px; }
  body{ padding:12px 12px calc(24px + env(safe-area-inset-bottom)); }
  header{ display:flex; align-items:center; gap:8px; padding:4px 2px 12px; }
  header .dot{ width:9px; height:9px; border-radius:50%; background:var(--danger); flex:0 0 auto; }
  header .dot.on{ background:var(--accent); }
  header h1{ font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:400; margin:0; }
  .empty{ color:var(--muted); text-align:center; padding:40px 16px; line-height:1.5; }
  .layer{ background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px; margin-bottom:12px; }
  .layer-head{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .layer-name{ flex:1 1 auto; font-size:15px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .blk{ flex:0 0 auto; width:40px; height:34px; border-radius:6px; border:1px solid var(--line-2); background:var(--panel-2);
        color:var(--muted); font-family:var(--mono); font-size:15px; }
  .blk.on{ background:var(--danger); border-color:var(--danger); color:#1a0e0e; }
  /* Deck-style clip cells: a thumbnail with a name bar underneath, like the
     editor's Composition deck. Tap to trigger; the active clip gets an accent ring. */
  .clips{ display:grid; grid-template-columns:repeat(auto-fill, minmax(96px,1fr)); gap:8px; }
  .clip{ border:1px solid var(--line-2); border-radius:6px; overflow:hidden; background:var(--panel-2);
         padding:0; cursor:pointer; }
  .clip-thumb{ display:block; width:100%; aspect-ratio:16/9; background:#000 center/cover no-repeat; }
  .clip-name{ font-family:var(--mono); font-size:12px; color:var(--text); padding:5px 6px; text-align:left;
              overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .clip:active{ border-color:var(--accent); }
  .clip:active .clip-name{ background:var(--accent); color:#1a120a; }
  .clip.active{ border-color:var(--accent); }
  .clip.active .clip-name{ background:var(--accent-soft); color:var(--accent); }
  .ctrl{ margin-top:12px; }
  .ctrl-row{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:4px; }
  .ctrl-row .lab{ color:var(--muted); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ctrl-row .val{ color:var(--text); font-size:13px; font-variant-numeric:tabular-nums; }
  /* Big touch sliders */
  input[type=range]{ -webkit-appearance:none; appearance:none; width:100%; height:34px; background:transparent; margin:0; }
  input[type=range]::-webkit-slider-runnable-track{ height:10px; border-radius:5px; background:var(--panel-2); border:1px solid var(--line-2); }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:26px; height:26px; margin-top:-9px;
        border-radius:50%; background:var(--accent); border:2px solid var(--bg); }
  input[type=range]::-moz-range-track{ height:10px; border-radius:5px; background:var(--panel-2); border:1px solid var(--line-2); }
  input[type=range]::-moz-range-thumb{ width:24px; height:24px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); }
  .section-label{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:18px 2px 8px; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <h1 id="title">Control — connecting…</h1>
  </header>
  <main id="app">
    <div class="empty" id="empty">Waiting for the show…<br><small>Open the editor on this network.</small></div>
  </main>
  <script type="module" src="./remote.js"></script>
</body>
</html>
