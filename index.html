<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>ledzeppelin</title>
<link rel="icon" href="data:,">
<style>html,body{margin:0;background:#0a0a0a;color:#eee;font:13px system-ui}
canvas{display:block}#hud{position:fixed;bottom:8px;left:14px;opacity:.7;z-index:10;pointer-events:none;font-variant-numeric:tabular-nums;text-shadow:0 1px 3px #000}</style>
<link rel="stylesheet" href="./src/ui/ui.css"></head>
<body>
<div id="hud">booting…</div>
<div id="tabs" class="tabs">
  <button id="tab-composition" class="tab tab-active" data-tab="composition">Composition</button>
  <button id="tab-output" class="tab" data-tab="output">Output</button>
</div>
<div id="layout">
  <!-- LEFT: clip-slot deck (top) + canvas monitor (fills) -->
  <div id="left">
    <section id="deckbar" class="panel"></section>
    <div id="stagewrap">
      <canvas id="stage"></canvas>
      <canvas id="preview" width="1280" height="720"></canvas>
    </div>
  </div>

  <!-- COMPOSITION view: inspector column (Clip | Composition sub-tabs) + library -->
  <aside id="inspector-col" class="panel">
    <div id="insp-tabs" class="subtabs">
      <button class="subtab subtab-active" data-itab="clip">Clip</button>
      <button class="subtab" data-itab="composition">Composition</button>
    </div>
    <div id="insp-clip"></div>
    <div id="insp-composition" hidden>
      <div id="comp-settings"></div>
      <div id="insp-compfx"></div>
    </div>
  </aside>
  <aside id="library-col" class="panel">
    <div id="library"></div>
  </aside>

  <!-- OUTPUT view: Input/Output toggle + import + fixtures -->
  <aside id="output-view" class="panel" hidden>
    <div id="output-mode" class="seg" role="tablist">
      <button id="seg-input" class="seg-btn seg-active" data-mode="input">Input</button>
      <button id="seg-output" class="seg-btn" data-mode="output">Output</button>
    </div>
    <div id="output-mode-hint" class="seg-hint"></div>
    <div id="editor-output-panels"></div>
  </aside>
</div>
<script type="module" src="./src/app.js"></script></body>
</html>
