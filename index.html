<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Led Zeppelin</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<!-- PWA: installable + offline app shell (see service-worker.js, registered in app.js). -->
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<meta name="application-name" content="Led Zeppelin">
<meta name="apple-mobile-web-app-title" content="Led Zeppelin">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- Type: MONO-FORWARD — one monospace face (Spline Sans Mono by default,
     Martian Mono swappable) drives chrome + data, self-hosted via @font-face in
     ui.css (offline-safe). Preload the active face. -->
<link rel="preload" href="./fonts/SplineSansMono.woff2" as="font" type="font/woff2" crossorigin>
<style>html,body{margin:0;background:#0a0a0a;color:#eee;font-size:11px}
canvas{display:block}
/* Status bar: a solid footer strip (application chrome). Mono face mirrors --ui-font;
   inline because this <style> runs before ui.css defines the token. */
#hud{display:flex;align-items:center;gap:14px;padding:0 4px;color:var(--muted);font:11px var(--mono,"Spline Sans Mono",ui-monospace,Menlo,monospace);font-variant-numeric:tabular-nums}</style>
<link rel="stylesheet" href="./src/ui/ui.css"></head>
<body>
<!-- OSC-address readout: shows the canonical address of the hovered/selected
     parameter, just above the corner telemetry. -->
<div id="param-osc"></div>
<!-- Hidden file input for Settings › Open show. -->
<input id="open-show-file" type="file" accept=".json,application/json" style="display:none">
<!-- Bottom-left cluster: File/Audio menus, the overlay/snap/blackout/hide-UI
     toggles, the zoom pill (appended at runtime), then the live telemetry inline. -->
<div id="corner-controls">
  <!-- Hide/show UI is FIRST so it keeps the same far-left spot whether or not the
       rest of the cluster is visible (it's the only control shown while hidden). -->
  <button id="g-hide" class="g-btn" title="hide all UI (H)">Hide UI</button>
  <button id="menu-file" class="g-btn" title="project file actions">File</button>
  <button id="menu-mapping" class="g-btn" title="MIDI / keyboard / OSC mapping (opens a window)">Mapping</button>
  <button id="menu-install" class="g-btn" title="download / update the app on GitHub">Install</button>
  <span class="corner-sep" aria-hidden="true"></span>
  <button id="overlay-toggle" title="show/hide fixtures on the canvas">fixtures</button>
  <button id="snap-btn" title="snap fixtures to each other & the grid">snap</button>
  <button id="grid-btn" title="show/hide the alignment grid">grid</button>
  <button id="color-btn" title="tint fixtures by controller colour">color</button>
  <button id="wall-btn" title="live view — dim the composite; the fixtures' pixels light up with what they sample">live</button>
  <span class="corner-sep" aria-hidden="true"></span>
  <button id="rec-btn" title="record the screen to a WebM video (pick this tab/window when prompted)">⏺ rec</button>
  <div id="hud">booting…</div>
</div>
<!-- Full-bleed canvas background (matte-style): the composite is centred and
     letterboxed to the composition aspect; the UI panels float over it. -->
<div id="stagewrap">
  <div id="stageinner">
    <canvas id="stage"></canvas>
    <canvas id="preview" width="1280" height="720"></canvas>
    <!-- Vector chrome (fixture outlines, arrows, handles, labels). Crisp at any
         zoom (rides the same transform); pointer-events off so the canvas keeps
         hit-testing. -->
    <svg id="ovl" viewBox="0 0 1280 720" preserveAspectRatio="none"></svg>
  </div>
</div>
<div id="layout">
  <!-- LEFT: clip-slot deck (Composition only); spacer otherwise -->
  <div id="left">
    <section id="deckbar" class="panel"></section>
  </div>

  <!-- RIGHT: one panel with a top-level DESIGN | OUTPUT switch. Design = the
       Clip/Layer/Composition inspector + library; Output = the Fixtures/Chains/
       Devices routing. Only one section shows at a time (more canvas room). -->
  <aside id="side" class="panel">
    <div id="section-switch" class="section-switch">
      <button class="section-tab section-active" data-section="design">Design</button>
      <button class="section-tab" data-section="output">Output</button>
      <button class="section-tab" data-section="system">System</button>
    </div>

    <!-- DESIGN -->
    <div id="design-pane">
      <div id="insp-tabs" class="subtabs">
        <button class="subtab subtab-active" data-itab="clip">Clip</button>
        <button class="subtab" data-itab="layer">Layer</button>
        <button class="subtab" data-itab="composition">Composition</button>
      </div>
      <div id="insp-panes">
        <div id="insp-clip"></div>
        <div id="insp-layer" hidden></div>
        <div id="insp-composition" hidden>
          <div id="comp-settings"></div>
          <div id="insp-compfx"></div>
        </div>
      </div>
      <!-- Sources / Effects library docked at the bottom of the inspector. -->
      <div id="library"></div>
    </div>

    <!-- OUTPUT -->
    <div id="output-pane" hidden>
      <div class="subtabs" id="io-tabs">
        <!-- data-otab keys are internal (kept stable); labels are user-facing.
             Fixtures = the merged patch view (place fixtures + create/edit devices +
             drag fixtures onto devices). Inventory = the catalog of models. -->
        <button class="subtab subtab-active" data-otab="fixtures">Fixtures</button>
        <button class="subtab" data-otab="library">Inventory</button>
      </div>
      <div id="io-body">
        <!-- Fixtures tab: the placement / wiring list. -->
        <div id="output-list"></div>
        <!-- Devices tab: the actual controller instances (name / ip / model). -->
        <div id="devices-design"></div>
        <!-- Library tab: the catalog of models — controller types + fixture types. -->
        <div id="library-design"></div>
      </div>
      <!-- Editor dock: the selected fixture/device's editor as a bottom window,
           below the list. Its bar is a CURTAIN — drag it up/down to set how much of
           the panel the editor uses (drag to the bottom to all but hide it). Hidden
           when nothing's selected. -->
      <div id="output-editor" hidden>
        <div id="output-editor-bar" title="drag to resize">
          <span id="output-editor-title"></span>
        </div>
        <div id="output-editor-body"></div>
      </div>
    </div>

    <!-- SYSTEM: Control (the companion surface — master controls + ticked params +
         the phone URL/QR/status) and Settings (accent colour + app preferences). -->
    <div id="system-pane" hidden>
      <div class="subtabs" id="system-tabs">
        <button class="subtab subtab-active" data-systab="settings">Settings</button>
        <button class="subtab" data-systab="control">Control<span class="tab-dot" id="control-subdot" title="companion / daemon status"></span></button>
      </div>
      <div id="system-control"></div>
      <div id="system-settings" hidden></div>
    </div>
  </aside>

</div>
<script type="module" src="./src/app.js"></script></body>
</html>
