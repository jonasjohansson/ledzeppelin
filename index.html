<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>LED Zeppelin</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="LED Zeppelin — a browser-based LED show composer and pixel-mapping control surface for WLED / DDP / Art-Net rigs.">
<meta name="color-scheme" content="dark">
<!-- theme-color matches the app's actual background so the installed PWA chrome has no seam. -->
<meta name="theme-color" content="#1c1c1c">
<!-- Boot fade-in: paint the dark surface immediately (no white flash), keep the UI
     hidden until app.js has applied the accent/theme + painted the first frame, then
     fade in. A safety timeout reveals it even if boot stalls, so it can't stay blank. -->
<style>
  html { background: #1c1c1c; opacity: 0; }
  html.ready { opacity: 1; transition: opacity .28s ease; }
  @media (prefers-reduced-motion: reduce) { html.ready { transition: none; } }
</style>
<script>addEventListener('load', () => setTimeout(() => document.documentElement.classList.add('ready'), 4000));</script>
<link rel="canonical" href="https://ledzeppelin.jonasjohansson.se/">
<!-- Social unfurl (the live demo domain). -->
<meta property="og:type" content="website">
<meta property="og:title" content="LED Zeppelin">

<!-- TOP BAR: a full-width strip of window/settings controls. Button ids are kept
     identical to the old corner cluster so every handler (wired by id in app.js)
     keeps working; the zoom pill is still appended at runtime to #corner-toggles. -->
<div id="topbar">
  <!-- Window menus as icon buttons. (Hide UI lives on the 'H' key now;
       Settings/Mapping/Library/Control each open their own popup window.) -->
  <div class="corner-row" id="corner-menus">
    <button id="menu-settings" class="g-icon" title="Settings — audio input, snap, output, appearance (opens a window)"><svg class="ic" aria-hidden="true"><use href="#ic-settings"/></svg></button>
    <button id="menu-lock" class="g-icon" title="Lock editing (performance mode)  (L)" aria-pressed="false"><svg class="ic" aria-hidden="true"><use href="#ic-lock-open"/></svg></button>
    <button id="menu-save" class="g-icon" title="Save project  (⌘S)"><svg class="ic" aria-hidden="true"><use href="#ic-save"/></svg></button>
    <button id="menu-open" class="g-icon" title="Open project  (⌘O)"><svg class="ic" aria-hidden="true"><use href="#ic-open"/></svg></button>
    <button id="menu-new" class="g-icon" title="New project"><svg class="ic" aria-hidden="true"><use href="#ic-new"/></svg></button>
    <button id="menu-mapping" class="g-icon" title="MIDI / keyboard / OSC mapping (opens a window)"><svg class="ic" aria-hidden="true"><use href="#ic-mapping"/></svg></button>
    <button id="menu-inventory" class="g-icon" title="Library — fixture &amp; controller templates (opens a window)"><svg class="ic" aria-hidden="true"><use href="#ic-library"/></svg></button>
    <button id="menu-remote" class="g-icon" title="Control surface (phone remote)"><svg class="ic" aria-hidden="true"><use href="#ic-remote"/></svg><span class="tab-dot" id="control-subdot" title="companion / daemon status"></span></button>
    <button id="menu-align" class="g-icon" title="align / distribute the selected fixtures" disabled><svg class="ic" aria-hidden="true"><use href="#ic-align"/></svg></button>
  </div>
  <div class="corner-row" id="corner-toggles">
    <span class="view-seg" id="view-seg">
      <button data-view="canvas" title="Canvas view: maximise the output"><svg class="ic" aria-hidden="true"><use href="#ic-view-canvas"/></svg></button>
      <button data-view="split" title="Split view: canvas + panels"><svg class="ic" aria-hidden="true"><use href="#ic-view-split"/></svg></button>
      <button data-view="edit" title="Editor view: roomy panels"><svg class="ic" aria-hidden="true"><use href="#ic-view-edit"/></svg></button>
      <button data-view="overlay" title="Float view: panels float translucent over a full-bleed canvas"><svg class="ic" aria-hidden="true"><use href="#ic-view-overlay"/></svg></button>
    </span>
    <span class="corner-sep"></span>
    <button id="panel-left" class="g-icon on" title="show/hide the left panel (gives the canvas more space)"><svg class="ic" aria-hidden="true"><use href="#ic-panel-left"/></svg></button>
    <button id="panel-bottom" class="g-icon on" title="show/hide the timeline"><svg class="ic" aria-hidden="true"><use href="#ic-panel-bottom"/></svg></button>
    <button id="panel-right" class="g-icon on" title="show/hide the right panel"><svg class="ic" aria-hidden="true"><use href="#ic-panel-right"/></svg></button>
    <span class="corner-sep"></span>
    <button id="overlay-toggle" class="g-icon" title="edit fixtures — show + select them on the canvas"><svg class="ic" aria-hidden="true"><use href="#ic-eye"/></svg></button>
    <button id="snap-btn" class="g-icon" title="snap fixtures to each other & the grid"><svg class="ic" aria-hidden="true"><use href="#ic-snap"/></svg></button>
    <button id="grid-btn" class="g-icon" title="show/hide the alignment grid"><svg class="ic" aria-hidden="true"><use href="#ic-grid"/></svg></button>
    <button id="color-btn" class="g-icon" title="tint fixtures by controller colour"><svg class="ic" aria-hidden="true"><use href="#ic-colour"/></svg></button>
    <button id="outline-btn" class="g-icon" title="fixture outlines — off shows only the light (the selected fixture stays editable)"><svg class="ic" aria-hidden="true"><use href="#ic-outline"/></svg></button>
    <button id="wall-btn" class="g-icon" title="output preview — dim the composite; the fixtures' pixels light up with what they sample"><svg class="ic" aria-hidden="true"><use href="#ic-live"/></svg></button>
    <button id="mode3d-btn" class="g-icon" title="3D mode — arrange &amp; view the rig in 3D; pick a Projection preset to shape the output sampling"><svg class="ic" aria-hidden="true"><use href="#ic-3d"/></svg></button>
  </div>
  <!-- Far-right cluster: help + bug report + install/update. -->
  <div class="corner-row" id="corner-right">
    <!-- Offline chip: hidden while the daemon is reachable; appears only when the
         output bridge is down (incl. the hosted site, which never has a daemon). -->
    <button id="daemon-chip" class="g-icon" title="Daemon offline — no LED output. Click to open /health." hidden><svg class="ic" aria-hidden="true"><use href="#ic-health"/></svg></button>
    <button id="menu-refresh" class="g-icon" title="Force update — clear cached app files & reload (keeps your saved project)"><svg class="ic" aria-hidden="true"><use href="#ic-rotate"/></svg></button>
    <button id="menu-guide" class="g-icon" title="User guide (opens a tab)"><svg class="ic" aria-hidden="true"><use href="#ic-guide"/></svg></button>
    <button id="menu-bug" class="g-icon" title="Report a bug"><svg class="ic" aria-hidden="true"><use href="#ic-bug"/></svg></button>
    <button id="menu-install" class="g-icon" title="Install / update the app"><svg class="ic" aria-hidden="true"><use href="#ic-install"/></svg></button>
  </div>
</div>
<!-- Always-visible escape hatch while the UI is hidden (H). Outside #topbar so it
     survives the top-bar hide; CSS shows it only in body.gui-hidden. -->
<button id="show-ui-pill" title="Show the interface  (H)">Show UI</button>
<!-- DOCK: a top bar over three columns of stacked "island" panels (Photoshop /
     MadMapper style). LEFT = the selected item's properties (Clip · Layer ·
     Composition) · CENTRE = Stage over the Timeline · RIGHT = Fixture editor ·
     Fixtures · Inventory. Splitters between islands and columns resize neighbours;
     everything is visible at once (no section switching). -->
<div id="dock">
  <!-- LEFT COLUMN: the selected item's properties as TABS (Composition · Layer · Clip).
       (Settings is a floating panel off the top-left gear now.) -->
  <div id="dock-left" class="dock-col">
    <!-- Left inspector: three stacked accordion windows (Composition · Layer · Clip);
         exactly one open at a time, and it follows the current selection (onClipSelect
         etc. → setInspectorTab). Kept under #grp-props so the scoped inspector CSS holds. -->
    <section class="island acc-host" id="grp-props">
      <div class="acc-sec is-open" data-acc="composition">
        <header class="acc-head"><span class="acc-title">Composition</span></header>
        <div class="acc-body">
          <div id="insp-composition">
            <div id="comp-settings"></div>
            <div id="insp-compfx"></div>
          </div>
        </div>
      </div>
      <div class="acc-sec" data-acc="layer">
        <header class="acc-head"><span class="acc-title">Layer</span></header>
        <div class="acc-body"><div id="insp-layer"></div></div>
      </div>
      <div class="acc-sec" data-acc="clip">
        <header class="acc-head"><span class="acc-title">Clip</span></header>
        <div class="acc-body"><div id="insp-clip"></div></div>
      </div>
    </section>
    <!-- legacy sources/effects shelf — kept mounted (createLayerPanel contract) but hidden. -->
    <div id="library" hidden></div>
  </div>

  <!-- CENTRE COLUMN: the Canvas (output) island over the Timeline. Settings + Mapping
       are top-bar links now (an overlay + a breakout window). -->
  <div id="dock-center" class="dock-col">
    <section id="stage-island" class="island">
      <div id="stagewrap">
        <div id="stageinner">
          <canvas id="stage"></canvas>
          <canvas id="preview" width="1280" height="720"></canvas>
          <!-- Vector chrome (fixture outlines, arrows, handles, labels). Crisp at any
               zoom (rides the same transform); pointer-events off so the canvas keeps
               hit-testing. -->
          <svg id="ovl" viewBox="0 0 1280 720" preserveAspectRatio="none"></svg>
        </div>
        <!-- PROJECTION preset row (3D mode only, CSS-gated by body.mode-3d):
             which camera the OUTPUT samples through. Buttons built by app.js
             from PROJECTION_PRESETS. -->
        <div id="proj-row"></div>
      </div>
    </section>
    <!-- The clip/layer deck. No title — the curtain on its top edge resizes it
         against the Canvas above. -->
    <section id="timeline-island" class="island">
      <div class="island-body"><section id="deckbar"></section></div>
    </section>
  </div>

  <!-- RIGHT COLUMN: the Devices patch. The selected item's editor shows in the left
       sidebar's "Device" tab. (The Inventory catalog moved to a popout window.) -->
  <div id="dock-right" class="dock-col">
    <!-- Patch island: the placement/wiring list + controller instances. -->
    <!-- Right patch: two stacked accordion windows (Output · Sources), one open at a
         time (setPatchTab). Kept under #grp-patch so scoped CSS holds. -->
    <section class="island acc-host" id="grp-patch">
      <div class="acc-sec is-open" data-acc="fixtures">
        <header class="acc-head"><span class="acc-title">Output</span></header>
        <div class="acc-body">
          <!-- the merged patch view: "Controller" + "Fixture" divider bars (each with a +
               to add one); the controller-grouped list renders below. -->
          <div id="patch-fixtures">
            <div class="out-divider">
              <span class="out-divider-label">Controller</span>
              <button id="devices-add-device" class="out-plus" title="Add a controller">+</button>
            </div>
            <div class="out-divider">
              <span class="out-divider-label">Fixture</span>
              <button id="devices-add-fixture" class="out-plus" title="Add a fixture">+</button>
            </div>
            <div id="output-list"></div>
          </div>
        </div>
      </div>
      <div class="acc-sec" data-acc="sources">
        <header class="acc-head"><span class="acc-title">Sources</span></header>
        <div class="acc-body"><div id="patch-sources"></div></div>
      </div>
    </section>
  </div>
</div>

<!-- Selected-device editor: a floating GROUP (island) that pops up where you click a
     controller/fixture/model. Its height follows its content; positioned in JS. -->
<!-- No heading — the editor's own Name field identifies the selection. -->
<section id="device-pop" class="island" hidden>
  <div class="island-body"><div id="fxinsp-body"></div></div>
</section>

<!-- (Settings opens as its own popup window — settings/ — from the top-left gear.) -->

<!-- The companion control surface opens in its own window (the top-bar remote icon).
     #system-control is a hidden mount that keeps the manifest/bridge wiring intact. -->
<div id="system-control" hidden></div>

<script type="module" src="./src/app.js"></script></body>
</html>
