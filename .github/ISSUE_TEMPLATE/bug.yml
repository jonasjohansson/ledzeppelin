name: Bug report
description: Something broke or behaves unexpectedly
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: The number in the bottom-left readout.
      placeholder: v1.0.81
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux / Raspberry Pi
        - Windows
        - Browser only
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug. You can drag in screenshots or a screen recording; images and video are supported.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
