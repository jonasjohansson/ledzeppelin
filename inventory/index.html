<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#1c1c1c">
<title>Library · LED Zeppelin</title>
<link rel="icon" type="image/png" href="../icons/favicon.png">
<link rel="stylesheet" href="../src/ui/ui.css">
<style>
  /* Inventory window — the standalone TEMPLATE-LIBRARY editor (controller models +
     fixture types). Styled from the shared design tokens in ../src/ui/ui.css so it
     reads as the same serious, near-black, mono, hairline app surface (see
     [[ui-aesthetic-ocr-disguise]]). It mounts the SAME library list + detail editor
     that used to live in the removed Inventory tab — see inventory.js. All
     colours/sizes come from var(--…); the fallbacks here only matter if ui.css
     ever fails to load. */
  html, body { margin: 0; background: var(--bg); color: var(--text); font: var(--fs-ctrl) var(--ui-font); line-height: var(--lh-ui); }
  .inv-wrap { padding: var(--s5); max-width: 880px; margin: 0 auto; }
  .inv-head { display: flex; align-items: baseline; gap: var(--s5); margin-bottom: var(--s4); }
  .inv-title { font: var(--fw-med) var(--fs-title) var(--ui-font); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--text); }
  /* Two framed panes: the model LIST (controllers + fixtures) and the selected
     item's DETAIL editor — the same master/detail split the app used in its sidebar.
     Hairline frames make each region structural (vs floating in empty space). */
  .inv-cols { display: grid; grid-template-columns: minmax(240px, 300px) minmax(0, 1fr); gap: var(--s4); align-items: start; }
  @media (max-width: 720px) { .inv-cols { grid-template-columns: 1fr; } }
  .inv-pane { border: 1px solid var(--line); border-radius: var(--radius); padding: var(--s4); background: var(--panel); }
  .inv-pane-title { font: var(--fw-med) var(--fs-micro) var(--ui-font); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--faint);
    border-bottom: 1px solid var(--line); padding: 0 0 var(--s2); margin: 0 0 var(--s4); }
  .inv-detail { min-width: 0; }
  /* Cap the editor content so label+control rows (and sliders) don't stretch to a
     huge width on a wide window — keeps the form readable and tight. */
  #inv-detail { max-width: 420px; }
  .inv-detail-hint { color: var(--faint); font-style: italic; font-size: var(--fs-body); }
  .inv-import { margin-top: var(--s4); }
  .inv-import #inv-import-pick { max-width: 320px; }
</style>
</head>
<body>
<div class="inv-wrap">
  <div class="inv-head">
    <span class="inv-title">Library</span>
  </div>
  <div class="inv-cols">
    <div class="inv-pane">
      <div class="inv-pane-title">library</div>
      <div id="inv-list"></div>
    </div>
    <div class="inv-pane inv-detail">
      <div class="inv-pane-title" id="inv-detail-title">properties</div>
      <div id="inv-detail"></div>
    </div>
  </div>
  <!-- LEDger import (pick a preset → assign controller IPs → apply). No always-visible
       section — it's triggered from the footer "Import from LEDger…" button (posts
       'open-import'); the preview + assign/apply UI renders inline here only while an
       import is in progress. -->
  <div class="inv-import inv-pane"><div id="inv-import"></div></div>
</div>
<script type="module" src="./inventory.js"></script>
</body>
</html>
