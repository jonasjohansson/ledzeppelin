<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- LED spectrum body -->
    <linearGradient id="led" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5d6c"/>
      <stop offset=".22" stop-color="#ffb24d"/>
      <stop offset=".46" stop-color="#5dd1a3"/>
      <stop offset=".72" stop-color="#5cc8ff"/>
      <stop offset="1" stop-color="#b18bff"/>
    </linearGradient>
    <!-- glossy gold bolt -->
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe169"/>
      <stop offset=".55" stop-color="#ffb01f"/>
      <stop offset="1" stop-color="#ef8a1e"/>
    </linearGradient>
    <linearGradient id="vio" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d3b8ff"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <g transform="rotate(-12 16 15)">
    <!-- light rim behind the body (the glossy edge highlight) -->
    <ellipse cx="15" cy="15" rx="13.4" ry="6.4" fill="none" stroke="#aadef7" stroke-width="1.3"/>
    <!-- spectrum body with a dark navy outline -->
    <ellipse cx="15" cy="15" rx="12.6" ry="5.7" fill="url(#led)" stroke="#0f1838" stroke-width="1.5"/>
    <!-- top gloss sheen -->
    <ellipse cx="13.8" cy="12.9" rx="9.4" ry="2.1" fill="#ffffff" opacity=".22"/>
    <!-- tail fin -->
    <path d="M26 15 l4.2 -2.7 v5.4 z" fill="url(#vio)" stroke="#0f1838" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- gondola -->
    <rect x="11.4" y="19.3" width="7.6" height="2.5" rx="1.25" fill="#1b2030" stroke="#0f1838" stroke-width="1"/>
  </g>
  <!-- lightning bolt slashing through the body -->
  <path d="M18.8 2.8 l-8.2 12.2 h4.9 l-3.5 10.2 10.2 -13.4 h-5.1 z"
        fill="url(#gold)" stroke="#0f1838" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
